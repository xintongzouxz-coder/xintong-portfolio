      - paragraph [ref=e31]: I led the redesign and adoption strategy for Kody's Pay by Bank (PBB) experience, an Open Banking payment method initially launched on in-person terminals.
      - paragraph [ref=e32]: I reframed the problem, defined a persona aligned to a business needs and prioritised a new growth channel. The result was a ~120% usage uplift within a month, alongside increased payment-method share in eligible flows.
      - paragraph [ref=e33]: Starting from a request to add more banks to the terminal grid, I created lightweight prototypes to compare solution routes and conducted 10+ merchant and staff interviews to diagnose adoption blockers—channel fit.
