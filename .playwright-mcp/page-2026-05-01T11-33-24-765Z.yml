        - heading "Create a reference implementation" [level=3] [ref=e176]
      - paragraph [ref=e177]: Rather than attempting a full migration across all products, a progressive rollout strategy was suggested to minimise disruption and reduce implementation risk. Terminal (Android) was selected as the initial surface due to its high usage frequency and relatively controlled scope. The new token and component system was applied to key user flows (new payment), creating a working reference for how the system should be used in practice. Legacy screens were maintained temporarily, while all new designs followed the updated token and component system.
      - img "Terminal 屏幕 + 组件标注" [ref=e178]
