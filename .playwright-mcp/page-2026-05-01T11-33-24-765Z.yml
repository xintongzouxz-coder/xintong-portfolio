      - paragraph [ref=e135]: A key deliverable was a clear, accessible source of truth for design, QA, and engineering. I collaborated with QA to organise 67 terminal designs and 23 receipt designs based on the payment flow — speeding up QA and designer processes.
      - img "按支付流程整理的 Terminal/Receipt 设计库" [ref=e136]
