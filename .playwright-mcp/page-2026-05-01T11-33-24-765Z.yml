      - paragraph [ref=e32]: "\"Reduced foundation tokens by 76%, cutting design-to-code handoff ambiguity and enabling a 13% reduction in receipt paper usage across the merchant network.\""
      - paragraph [ref=e33]: Kody's product ecosystem had grown into four platforms, each evolving independently. As the system scaled, the UI became fragmented — slowing down delivery, creating inconsistencies, and making design-to-development alignment difficult.
      - paragraph [ref=e34]: I led efforts to bring structure by defining a shared foundation and constrained reusable components that could scale across products.
