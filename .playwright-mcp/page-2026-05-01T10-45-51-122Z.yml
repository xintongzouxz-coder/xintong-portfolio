      - generic [ref=e134]:
        - paragraph [ref=e135]: My journey began in industrial design. Though I loved the freedom of academic practice, yet as a student, the limitations of resources and the nature of the industry often made it difficult to see my designs come to fruition.
        - paragraph [ref=e136]: I wanted to push my design craft at a faster pace and have a positive impact on vastly more people. This ambition opened the doors to experience design, where I could leverage the skills and design principles learned from industrial design.
        - paragraph [ref=e137]: I enjoy the detective-like exploration involved in user research and the thrill of seeing users' surprised reactions to my design solutions—although it can sometimes be nerve-wracking.
        - paragraph [ref=e138]: Today, I work as a Product Designer at different London startups, focused on Fintech and Wellbeing. Most of my work is about helping powerful products feel easier to understand, easier to adopt, and more meaningful in people's daily workflows.
