        - paragraph [ref=e215]: To sanity-check the hypothesis, I partnered with our data team to run a lightweight segmentation check using "merchant category (KYC code) + typical AOV ≥ £40". From the resulting merchant list, we saw that Pay by Link appeared more frequently in higher-value, off-premise scenarios—supporting it as the primary channel to prioritise for PBB adoption.
        - paragraph [ref=e216]: We shifted the centre of gravity from 'expanding banks on terminal' to 'making Pay by Bank succeed in Pay by Link'. Terminal expansion was de-scoped into a secondary track.
