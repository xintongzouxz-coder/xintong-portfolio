        - heading "Where Pay by Bank can actually win" [level=2] [ref=e194]
        - paragraph [ref=e195]: After all the insights, I joined a deep-dive with the CTO, Head of PD and Tech Lead alongside the PM to align my findings and bring out my Opportunity hypothesis.
        - paragraph [ref=e197]: "\"PBB is better suited to low-urgency, off-premise payment moments (e.g., prepayments, remote orders, booking deposits), where transactions are more likely to meet the £40+ threshold\""
        - paragraph [ref=e198]: "Based on this hypothesis, I drafted a few criteria to define a proto-persona for Pay by Bank:"
